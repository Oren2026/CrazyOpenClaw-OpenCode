<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成就徽章墙 - 黑皮的大学人生岛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a1a;
            --bg-light: #1a1a3a;
            --sea-color: #00a8cc;
            --sea-dark: #007799;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }

        body {
            font-family: "Source Han Sans SC", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-light) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .ocean {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 168, 204, 0.1) 50%, rgba(0, 168, 204, 0.2) 100%);
            border-radius: 50% 50% 0 0;
            animation: wave 15s ease-in-out infinite;
        }

        .wave:nth-child(2) {
            bottom: 10%;
            opacity: 0.6;
            animation: wave 12s ease-in-out infinite;
            animation-delay: -3s;
        }

        .wave:nth-child(3) {
            bottom: 20%;
            opacity: 0.4;
            animation: wave 18s ease-in-out infinite;
            animation-delay: -6s;
        }

        @keyframes wave {
            0%, 100% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(5%) translateY(-10px); }
            50% { transform: translateX(0) translateY(-20px); }
            75% { transform: translateX(-5%) translateY(-10px); }
        }

        .header {
            padding: 2rem;
            text-align: center;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }

        .page-title {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .badges-container {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .status-dot.unlocked { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .status-dot.in-progress { background: var(--sea-color); box-shadow: 0 0 10px var(--sea-color); }
        .status-dot.locked { background: var(--text-secondary); }

        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .badge-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .badge-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--sea-color), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .badge-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--sea-color);
            box-shadow: 0 30px 60px rgba(0, 168, 204, 0.3);
        }

        .badge-card:hover::before {
            opacity: 1;
        }

        .badge-card.locked {
            filter: grayscale(80%) brightness(0.7);
        }

        .badge-card.locked:hover {
            border-color: var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .badge-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .badge-hexagon {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--sea-color), var(--sea-dark));
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            position: relative;
            transition: all 0.3s;
        }

        .badge-card.locked .badge-hexagon {
            background: linear-gradient(135deg, #555, #333);
        }

        .badge-card.unlocked .badge-hexagon {
            background: linear-gradient(135deg, var(--gold), #ffa500);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .badge-card.in-progress .badge-hexagon {
            background: linear-gradient(135deg, var(--sea-color), #0099cc);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 168, 204, 0.3); }
            50% { box-shadow: 0 0 40px rgba(0, 168, 204, 0.6); }
        }

        .lock-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .badge-status {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        .badge-status.unlocked {
            background: rgba(255, 215, 0, 0.2);
            color: var(--gold);
        }

        .badge-status.in-progress {
            background: rgba(0, 168, 204, 0.2);
            color: var(--sea-color);
        }

        .badge-status.locked {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        .badge-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .badge-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .badge-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .badge-card:hover .badge-desc {
            max-height: 100px;
            margin-top: 0.5rem;
        }

        .badge-progress {
            margin-top: 1rem;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .badge-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--sea-color), var(--sea-dark));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .badges-grid {
                grid-template-columns: 1fr;
            }

            .status-bar {
                gap: 1rem;
            }

            .badge-icon {
                width: 80px;
                height: 80px;
            }

            .badge-hexagon {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="ocean">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <header class="header">
        <a href="index.html" class="back-btn">← 返回岛屿</a>
        <h1 class="page-title">🏆 成就徽章墙</h1>
        <p class="page-subtitle">每一次突破的见证</p>
    </header>

    <section class="badges-container">
        <div class="status-bar">
            <div class="status-item">
                <span class="status-dot unlocked"></span>
                <span>已获得 1</span>
            </div>
            <div class="status-item">
                <span class="status-dot in-progress"></span>
                <span>进行中 1</span>
            </div>
            <div class="status-item">
                <span class="status-dot locked"></span>
                <span>未获得 2</span>
            </div>
        </div>

        <div class="badges-grid">
            <div class="badge-card unlocked">
                <div class="badge-icon">
                    <div class="badge-hexagon">🎯</div>
                </div>
                <span class="badge-status unlocked">已获得</span>
                <div class="badge-name">初战告捷</div>
                <div class="badge-date">2025.06</div>
                <div class="badge-desc">大一首次通过考试，开启大学之旅的新篇章</div>
            </div>

            <div class="badge-card in-progress">
                <div class="badge-icon">
                    <div class="badge-hexagon">📚</div>
                    <span class="lock-overlay" style="display:none">🔒</span>
                </div>
                <span class="badge-status in-progress">进行中</span>
                <div class="badge-name">坚持不懈</div>
                <div class="badge-date">2025.09 - 进行中</div>
                <div class="badge-desc">持续学习，每天进步一点点，向目标前进</div>
                <div class="badge-progress">
                    <div class="badge-progress-bar" style="width: 65%"></div>
                </div>
            </div>

            <div class="badge-card locked">
                <div class="badge-icon">
                    <div class="badge-hexagon">📄</div>
                    <span class="lock-overlay">🔒</span>
                </div>
                <span class="badge-status locked">未获得</span>
                <div class="badge-name">论文发表</div>
                <div class="badge-date">—</div>
                <div class="badge-desc">在学术期刊或会议上发表研究成果</div>
            </div>

            <div class="badge-card locked">
                <div class="badge-icon">
                    <div class="badge-hexagon">🏅</div>
                    <span class="lock-overlay">🔒</span>
                </div>
                <span class="badge-status locked">未获得</span>
                <div class="badge-name">比赛得名</div>
                <div class="badge-date">—</div>
                <div class="badge-desc">在各类竞赛中脱颖而出，获得前三名成绩</div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>© 2026 黑皮 · 航行中</p>
    </footer>
</body>
</html>
