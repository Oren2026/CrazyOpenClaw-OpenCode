<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行事曆</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #0d1a2a 100%);
            min-height: 100vh;
            color: #fff;
            padding: 1rem;
        }
        .container {
            display: flex;
            gap: 1.5rem;
            max-width: 900px;
            margin: 0 auto;
        }
        .main { flex: 1; }
        .header {
            text-align: center;
            margin-bottom: 1rem;
        }
        .header a {
            color: #00a8cc;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .month-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .nav-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .nav-btn:hover { border-color: #00a8cc; background: rgba(0,168,204,0.2); }
        .current-month { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.05em; }
        .legend {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }
        .legend span { display: flex; align-items: center; gap: 0.3rem; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .calendar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 1.2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
        }
        .weekdays div:first-child { color: #42a5f5; }
        .weekdays div:last-child { color: #ab47bc; }
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .day {
            min-height: 85px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 8px;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            transition: background 0.2s;
        }
        .day:hover { background: rgba(255,255,255,0.06); }
        .day.empty { background: transparent; border: none; }
        .day.today {
            background: rgba(0,168,204,0.15);
            border-color: #00a8cc;
            box-shadow: 0 0 20px rgba(0,168,204,0.3);
        }
        .day.today .num { color: #00a8cc; font-weight: 700; }
        .day.weekend { opacity: 0.7; }
        .num { font-weight: 600; margin-bottom: 4px; }
        .event {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 6px;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        .event.competition { background: rgba(66,165,245,0.25); color: #64b5f6; border-left: 3px solid #42a5f5; }
        .event.school { background: rgba(102,187,106,0.25); color: #81c784; border-left: 3px solid #66bb6a; }
        .event.future { background: rgba(255,202,40,0.25); color: #ffd54f; border-left: 3px solid #ffca28; }
        .event.personal { background: rgba(171,71,188,0.25); color: #ba68c8; border-left: 3px solid #ab47bc; }
        .sidebar {
            width: 220px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 1.2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            height: fit-content;
        }
        .sidebar h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #ffca28;
            text-align: center;
        }
        .pending-item {
            background: rgba(255,202,40,0.1);
            border: 1px solid rgba(255,202,40,0.2);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }
        .pending-item .date { color: #ffca28; font-weight: 600; }
        .pending-item .title { color: #fff; margin: 4px 0; }
        .pending-item .note { color: rgba(255,255,255,0.5); font-size: 0.75rem; }
        @media (max-width: 700px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
            .day { min-height: 65px; padding: 5px; }
            .event { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html">← 返回</a>
    </div>

    <div class="container">
        <div class="main">
            <div class="month-nav">
                <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
                <span class="current-month" id="currentMonth"></span>
                <button class="nav-btn" onclick="changeMonth(1)">›</button>
            </div>

            <div class="legend">
                <span><div class="dot" style="background:#42a5f5"></div>比賽</span>
                <span><div class="dot" style="background:#66bb6a"></div>學校</span>
                <span><div class="dot" style="background:#ffca28"></div>未來</span>
                <span><div class="dot" style="background:#ab47bc"></div>個人</span>
            </div>

            <div class="calendar">
                <div class="weekdays">
                    <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
                </div>
                <div class="grid" id="grid"></div>
            </div>
        </div>

        <div class="sidebar">
            <h3>✦ 待確認事項</h3>
            <div id="pendingList"></div>
        </div>
    </div>

    <script>
        const events = [
            { title: '成都旅行', category: 'personal', start: '2026-06-13', end: '2026-06-18', note: '妈' },
            { title: '厦门旅行', category: 'personal', start: '2026-06-18', end: '2026-06-19', note: '室友' },
            { title: '系学会聚餐', category: 'school', start: '2026-06-19', end: '2026-06-19', note: '晚上6点' },
            { title: '支教活动', category: 'competition', start: '2027-07-?', end: null, note: '时间待确认' }
        ];

        let current = new Date();
        let year = current.getFullYear();
        let month = current.getMonth();

        const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

        function changeMonth(delta) {
            month += delta;
            if (month > 11) { month = 0; year++; }
            if (month < 0) { month = 11; year--; }
            render();
        }

        function render() {
            document.getElementById('currentMonth').textContent = `${year}年 ${monthNames[month]}`;
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDay = (firstDay.getDay() + 6) % 7;
            const daysInMonth = lastDay.getDate();

            const today = new Date();
            const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
            const todayDate = today.getDate();

            for (let i = 0; i < startDay; i++) {
                grid.innerHTML += '<div class="day empty"></div>';
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dayOfWeek = (startDay + d - 1) % 7;
                const isWeekend = dayOfWeek === 5 || dayOfWeek === 6;
                const isToday = isCurrentMonth && d === todayDate;
                const dayEvents = events.filter(e => {
                    const s = new Date(e.start.replace(/\?/g, '01'));
                    const eEnd = e.end ? new Date(e.end.replace(/\?/g, '01')) : s;
                    const curr = new Date(year, month, d);
                    return curr >= s && curr <= eEnd;
                });

                let eventsHtml = dayEvents.map(ev =>
                    `<div class="event ${ev.category}">${ev.title}</div>`
                ).join('');

                grid.innerHTML += `
                    <div class="day${isToday ? ' today' : ''}${isWeekend ? ' weekend' : ''}">
                        <div class="num">${d}</div>
                        ${eventsHtml}
                    </div>
                `;
            }

            const total = startDay + daysInMonth;
            const remaining = 42 - total;
            for (let i = 0; i < remaining; i++) {
                grid.innerHTML += '<div class="day empty"></div>';
            }

            renderPending();
        }

        function renderPending() {
            const pending = events.filter(e => {
                return (e.note && e.note.includes('待確認')) ||
                       (e.note && e.note.includes('待确认')) ||
                       (e.start && e.start.includes('?'));
            });

            const list = document.getElementById('pendingList');
            if (pending.length === 0) {
                list.innerHTML = '<div style="color:rgba(255,255,255,0.4);text-align:center;font-size:0.8rem;">暫無待確認事項</div>';
                return;
            }

            list.innerHTML = pending.map(ev => {
                const dateStr = ev.start.includes('?') ? ev.start : ev.start;
                return `
                    <div class="pending-item">
                        <div class="date">${dateStr}</div>
                        <div class="title">${ev.title}</div>
                        <div class="note">${ev.note || ''}</div>
                    </div>
                `;
            }).join('');
        }

        render();
    </script>
</body>
</html>
